name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:
  validate:
    name: Quality, security, and package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage thresholds
        run: pnpm test:coverage

      - name: Lint
        run: pnpm lint

      - name: Check unused code and dependencies
        run: pnpm knip

      - name: Audit production and development dependencies
        run: pnpm audit --audit-level high

      - name: Build Caido package
        run: pnpm build

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: caido-js-secret-hunter-${{ github.sha }}
          path: dist/plugin_package.zip
          if-no-files-found: error
          retention-days: 14
